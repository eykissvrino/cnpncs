[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "mkdir -p /data && npx prisma db push --accept-data-loss && node prisma/migrate.mjs && exec node_modules/.bin/next start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
